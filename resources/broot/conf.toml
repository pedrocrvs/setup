# abrir no hx com enter

# ctrl+d para deletar arquivo
# ctrl+r para renomear (ou algo parecido com o hx)
# ctrl+c para copiar o nome do arquivo (ou algo parecido com o helix)

# habilitar a lixeira

# um shortcut para ir para o topo (ctrl+g)
# um shortcut para ir para o final (ctrl+e)

[[verbs]]
internal = ":line_up"
key = "ctrl-k"

[[verbs]]
internal = ":line_down"
key = "ctrl-j"

[[verbs]]
internal = ":input_go_to_start"
key = "ctrl-a"

[[verbs]]
internal = ":input_go_to_end"
key = "ctrl-e"

[[verbs]]
internal = ":input_del_word_left"
key = "ctrl-w"

[[verbs]]
internal = ":input_clear"
key = "ctrl-c"

[[verbs]]
internal = ":focus ~/"
key = "ctrl-h"
