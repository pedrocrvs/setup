theme = "dark_plus"

[editor]
color-modes = true
default-line-ending = "lf"
line-number = "relative"
rulers = [100]
shell = ["nushell", "--commands"]
text-width = 100
true-color = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "block"

[editor.whitespace.render]
nbsp = "all"
newline = "none"
nnbsp = "all"
space = "all"
tab = "all"

[editor.indent-guides]
render = true
